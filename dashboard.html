<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard Socio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.json" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/index.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Antonio:wght@100..700&display=swap"
    />
    <meta name="theme-color" content="#1a1a1a" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-left">
        <img
          class="logoRacing"
          src="./media/img16-transformed_preview_rev_1.png"
          alt=""
        />
      </div>

      <div class="header-center">
        <!-- Buscador / título -->
      </div>

      <div class="header-right">
        <button class="btn btn-custom" onclick="logout()">Cerrar sesión</button>
      </div>
    </header>
    <main>
      <section class="container-fluid text-center">
        <h2 id="saludo">Cargando...</h2>
        <p class="my-2" id="estadoCuota"></p>
        <p class="my-2" id="vencimiento"></p>
      </section>
    </main>
    <footer></footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="./js/dashboard.js"></script>
