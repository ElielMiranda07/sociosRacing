<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1a1a" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/index.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Antonio:wght@100..700&display=swap"
    />
  </head>
  <body class="container-fluid d-flex flex-column justify-content-center">
    <section class="d-flex justify-content-center my-3">
      <img class="akd" src="./media/akdBlanco.png" alt="" />
    </section>
    <section class="d-flex flex-column align-items-center">
      <h1 class="my-2">Cambiar contraseña</h1>

      <input
        class="my-2"
        type="password"
        id="nuevaPassword"
        placeholder="Nueva contraseña"
      />
      <input
        class="my-2"
        type="password"
        id="confirmarPassword"
        placeholder="Confirmar contraseña"
      />

      <button class="btn btn-lg btn-custom" onclick="cambiarPassword()">
        Guardar
      </button>
    </section>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="./js/cambiarPassword.js"></script>
  </body>
</html>
