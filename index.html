<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Socios Racing - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/index.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Antonio:wght@100..700&display=swap"
    />
    <meta name="theme-color" content="#1a1a1a" />
  </head>
  <body class="container-fluid d-flex flex-column justify-content-center">
    <section class="d-flex justify-content-center my-3">
      <img class="akd" src="./media/akdBlanco.png" alt="" />
    </section>
    <section class="d-flex flex-column align-items-center">
      <h1 class="my-2">Ingreso Socios</h1>
      <div class="container input-group my-2">
        <input
          class="form-control"
          type="text"
          id="dni"
          placeholder="Ingrese su DNI"
        />

        <div class="input-group">
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Contraseña"
          />

          <button
            class="btn btn-outline-secondary"
            type="button"
            id="togglePassword"
          >
            👁
          </button>
        </div>
      </div>

      <button class="btn btn-lg btn-custom" onclick="login()">Ingresar</button>

      <p id="error" style="color: red"></p>
    </section>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="./js/login.js"></script>
  </body>
</html>
